<!-- =========================
     ChatBot
========================= -->

<div id="chatbot">

    <div id="chat-header">

        <div>

            <strong>🤖 Fat To Fit Assistant</strong><br>

            <small>Online</small>

        </div>

        <button id="closeChat">✖</button>

    </div>

    <div id="chat-body">

        <div class="bot">

            👋 Hello!

            <br><br>

            Welcome to <b>Fat To Fit Community</b>

            <br><br>

            How can I help you today?

        </div>

    </div>

    <div class="quick-buttons">

        <button onclick="quickReply('join')">Join</button>

        <button onclick="quickReply('diet')">Diet</button>

        <button onclick="quickReply('bmi')">BMI</button>

        <button onclick="quickReply('exercise')">Exercise</button>

    </div>

    <div id="chat-footer">

        <input

        type="text"

        id="userInput"

        placeholder="Type your message...">

        <button id="sendBtn">

            ➤

        </button>

    </div>

</div>

<button id="chatIcon">

💬

</button>
